<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vox Angelos — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Syne+Mono&family=Barlow:wght@300;400&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

  <div class="bg"></div>
  <div class="bg-grid"></div>

  <div class="tech-wrapper row g-0">

    <!-- Corner accents -->
    <div class="corner c-tl"></div>
    <div class="corner c-tr"></div>
    <div class="corner c-bl"></div>
    <div class="corner c-br"></div>

    <!-- Left panel: branding -->
    <div class="col-md-5 panel-left">
      <div class="eyebrow mb-2">Official Government Portal</div>
      <h1 class="title">Vox<br>Angelos</h1>
      <div class="eyebrow mt-3">Citizen · Voice · Governance</div>
    </div>

    <!-- Right panel: form -->
    <div class="col-md-7 panel-right">
      <div class="eyebrow mb-4">Secure Access</div>

      <form action="{{ url_for('login') }}" method="POST">

        <div class="mb-3">
          <label class="form-text-label mb-1 d-block">Email</label>
          <input type="email" name="email" class="tech-input form-control"
                 placeholder="Enter email" required>
        </div>

        <div class="mb-4">
          <label class="form-text-label mb-1 d-block">Password</label>
          <input type="password" name="password" class="tech-input form-control"
                 placeholder="Enter password" required>
        </div>

        <button type="submit" class="cta mb-3">
          Log In <span class="cta-arr ms-2"></span>
        </button>

        <p class="text-center mt-3" style="font-size: var(--fs-micro); color: var(--sub);">
          No account?
          <a href="{{ url_for('step1') }}" class="tech-link">Sign Up first.</a>
        </p>

      </form>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
