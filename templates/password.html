<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vox Angelos — Security & ID</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Syne+Mono&family=Barlow:wght@300;400&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/password.css') }}">
</head>
<body>

  <div class="bg"></div>
  <div class="bg-grid"></div>

  <div class="tech-wrapper row g-0">

    <!-- Corner accents -->
    <div class="corner c-tl"></div>
    <div class="corner c-tr"></div>
    <div class="corner c-bl"></div>
    <div class="corner c-br"></div>

    <!-- Left panel: branding -->
    <div class="col-md-5 panel-left">
      <div class="eyebrow mb-2">Citizen Registration</div>
      <h1 class="title">Security<br>& ID</h1>
      <div class="eyebrow mt-3">Step 2 of 2</div>
      <p style="color: var(--sub); font-size: var(--fs-micro); margin-top: 1.5rem; line-height: 1.8;">
        Secure your account with a strong password and provide a valid government-issued ID for verification.
      </p>
    </div>

    <!-- Right panel: form -->
    <div class="col-md-7 panel-right">
      <div class="eyebrow mb-4">Account Security</div>

      <form action="/register" method="POST" enctype="multipart/form-data">

        <!-- Hidden fields carrying over Step 1 data -->
        <input type="hidden" name="first_name"  value="{{ data.first_name }}">
        <input type="hidden" name="middle_name" value="{{ data.middle_name }}">
        <input type="hidden" name="last_name"   value="{{ data.last_name }}">
        <input type="hidden" name="phone"       value="{{ data.phone }}">
        <input type="hidden" name="email"       value="{{ data.email }}">

        <div class="mb-3">
          <label class="form-text-label mb-1 d-block">ID Type</label>
          <select name="id_type" class="tech-input form-select" required>
            <option value="" disabled selected>Select Type</option>
            <option value="UMID">UMID</option>
            <option value="Drivers License">Driver's License</option>
            <option value="Passport">Passport</option>
            <option value="PhilID">National ID</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-text-label mb-1 d-block">Profile Photo</label>
          <input type="file" name="profile_photo" accept="image/*"
                 class="tech-input form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-text-label mb-1 d-block">Password</label>
          <input type="password" name="password" class="tech-input form-control"
                 placeholder="Create a strong password" required>
        </div>

        <div class="mb-4">
          <label class="form-text-label mb-1 d-block">Confirm Password</label>
          <input type="password" name="confirm_password" class="tech-input form-control"
                 placeholder="Repeat your password" required>
        </div>

        <div class="d-flex gap-3">
          <a href="{{ url_for('step1') }}" class="cta" style="width:40%; text-decoration:none; justify-content:center;">
            ← Back
          </a>
          <button type="submit" class="cta" style="width:60%;">
            Register Now <span class="cta-arr ms-2"></span>
          </button>
        </div>

      </form>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
